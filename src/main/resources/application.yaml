spring:
  # 💡 यह लाइन स्प्रिंग बूट को बताएगी कि रूट फोल्डर से .env फ़ाइल को पढ़ना है
  config:
    import: optional:file:.env[.properties]

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  application:
    name: mycrud

  # 💡 यहाँ हमने वापस वेरिएबल्स लगा दिए हैं जो .env से डेटा उठाएंगे
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    org.hibernate.orm.jdbc.bind: TRACE